<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Repo Radar - Trending AI GitHub Repos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 2.5rem;
            color: #58a6ff;
            margin-bottom: 10px;
        }
        
        .tagline {
            font-size: 1.2rem;
            color: #8b949e;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .category-btn {
            padding: 10px 20px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-btn:hover,
        .category-btn.active {
            background: #58a6ff;
            color: #fff;
            border-color: #58a6ff;
        }
        
        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .repo-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .repo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(88, 166, 255, 0.2);
            border-color: #58a6ff;
        }
        
        .repo-name {
            font-size: 1.3rem;
            color: #58a6ff;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .repo-name:hover {
            text-decoration: underline;
        }
        
        .repo-description {
            color: #8b949e;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .repo-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            color: #8b949e;
            font-size: 0.9rem;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .language-tag {
            background: #388bfd30;
            color: #58a6ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #8b949e;
        }
        
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        
        .no-data h2 {
            margin-bottom: 15px;
            color: #c9d1d9;
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
        }
        
        footer a {
            color: #58a6ff;
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        .last-updated {
            text-align: center;
            margin-bottom: 30px;
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">🔍</div>
            <h1>AI Repo Radar</h1>
            <p class="tagline">Daily trending AI GitHub repos ranked by niche</p>
        </header>
        
        <div class="last-updated" id="lastUpdated"></div>
        
        <div class="categories" id="categories"></div>
        
        <div class="loading" id="loading">Loading trending AI repositories...</div>
        
        <div class="repos-grid" id="reposGrid"></div>
        
        <footer>
            <p>Auto-updated daily via <a href="https://github.com/sujithps-hue/ai-repo-radar" target="_blank">GitHub Actions</a></p>
            <p style="margin-top: 10px;">Data sourced from GitHub's trending repos</p>
        </footer>
    </div>
    
    <script>
        let allRepos = [];
        let currentCategory = 'all';
        
        // Fetch repos data
        fetch('repos.json')
            .then(response => response.json())
            .then(data => {
                allRepos = data.repos || [];
                const lastUpdate = data.updated || 'Unknown';
                
                document.getElementById('lastUpdated').textContent = `Last updated: ${new Date(lastUpdate).toLocaleString()}`;
                document.getElementById('loading').style.display = 'none';
                
                if (allRepos.length === 0) {
                    showNoData();
                } else {
                    renderCategories();
                    renderRepos();
                }
            })
            .catch(error => {
                console.error('Error loading repos:', error);
                document.getElementById('loading').textContent = 'Error loading repositories. Please try again later.';
            });
        
        function renderCategories() {
        const allNiches = allRepos.flatMap(r => r.niche || []);
        const categories = ['all', ...new Set(allNiches)];            const categoriesDiv = document.getElementById('categories');
            
            categoriesDiv.innerHTML = categories.map(cat => 
                `<button class="category-btn ${cat === 'all' ? 'active' : ''}" onclick="filterCategory('${cat}')">
                    ${cat.charAt(0).toUpperCase() + cat.slice(1).replace(/_/g, ' ')}
                </button>`
            ).join('');
        }
        
        function filterCategory(category) {
            currentCategory = category;
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderRepos();
        }
        
        function renderRepos() {
            const filtered = currentCategory === 'all' 
                ? allRepos 
                                : allRepos.filter(r => r.niche && r.niche.includes(currentCategory));
            
            const grid = document.getElementById('reposGrid');
            
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-data"><h2>No repositories found in this category</h2></div>';
            return;
        }                

            
            grid.innerHTML = filtered.map(repo => `
                
                    <a href="${repo.url}" target="_blank" class="repo-name">${repo.name}</a>
                    <p class="repo-description">${repo.description || 'No description available'}</p>
                    <div class="repo-meta">
                        <div class="meta-item">⭐ ${formatNumber(repo.stars)}</div>
                        <div class="meta-item">🍴 ${formatNumber(repo.forks)}</div>
                        ${repo.language ? `<div class="language-tag">${repo.language}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }
        
        function showNoData() {
            document.getElementById('reposGrid').innerHTML = `
                <div class="no-data">
                    <h2>No Data Available</h2>
                    <p>Repositories data is being generated. Please check back soon!</p>
                </div>
            `;
        }
    </script>
</body>
</html>
